name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# 동시에 두 배포가 겹치지 않게 한다(취소하지 않고 직렬화).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, mbstring, sqlite3, curl, gd
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        # CI 러너엔 커버리지 드라이버(Xdebug/pcov)가 없다. phpunit.dist.xml 은
        # failOnWarning=true + <coverage> 설정이라, 드라이버 부재 경고가 실패로
        # 승격된다. 커버리지를 끄고 테스트 게이트로만 사용한다.
        run: composer test -- --no-coverage

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/ci4blog
            ./scripts/deploy.sh
